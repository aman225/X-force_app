<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>X-Force Thunder Slash — Widget Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body { font-family: 'Inter', sans-serif; }
      @keyframes winFlash {
        0% { opacity: 0; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1.01); }
        100% { opacity: 1; transform: scale(1); }
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            animation: {
              winFlash: 'winFlash 0.4s ease-out',
              flash: 'flash 8s ease-out infinite',
            },
            keyframes: {
              winFlash: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '50%': { opacity: '1', transform: 'scale(1.01)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              flash: {
                '0%, 95%, 98%': { opacity: '0' },
                '96%, 99%': { opacity: '0.15' },
                '97%, 100%': { opacity: '0.05' },
              }
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-[#0a0a0f] min-h-screen flex flex-col items-center justify-start py-8 px-4">
    <div id="root" class="w-full flex justify-center"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
