<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>X-Force Thunder Slash — Widget Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body { font-family: 'Inter', sans-serif; }
      @keyframes winFlash {
        0% { opacity: 0; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1.01); }
        100% { opacity: 1; transform: scale(1); }
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            animation: {
              winFlash: 'winFlash 0.4s ease-out',
              flash: 'flash 8s ease-out infinite',
            },
            keyframes: {
              winFlash: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '50%': { opacity: '1', transform: 'scale(1.01)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              flash: {
                '0%, 95%, 98%': { opacity: '0' },
                '96%, 99%': { opacity: '0.15' },
                '97%, 100%': { opacity: '0.05' },
              }
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-gray-950 min-h-screen flex flex-col items-center justify-start py-8 px-4">

    <!-- Blinkit order page mock -->
    <div class="w-full max-w-sm">
      <!-- Order status bar -->
      <div class="bg-[#040810] rounded-2xl p-4 mb-4 border border-cyan-800/40">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-10 h-10 rounded-full bg-cyan-900/40 border border-cyan-500/40
                      flex items-center justify-center text-xl">🛵</div>
          <div>
            <p class="text-white text-sm font-bold">Rider is on the way!</p>
            <p class="text-gray-400 text-xs">Estimated: 12 minutes</p>
          </div>
        </div>
        <!-- Status controls for demo -->
        <p class="text-gray-500 text-xs mb-2">Simulate order status:</p>
        <div class="flex gap-2 flex-wrap">
          <button onclick="setStatus('rider_assigned')"
            class="text-xs px-3 py-1.5 rounded-lg bg-cyan-900/40 border border-cyan-500/40
                   text-cyan-400 font-medium hover:bg-cyan-800/60 transition-colors"
            id="btn-rider_assigned">
            Rider Assigned
          </button>
          <button onclick="setStatus('out_for_delivery')"
            class="text-xs px-3 py-1.5 rounded-lg bg-white/5 border border-white/10
                   text-gray-300 font-medium hover:bg-white/10 transition-colors"
            id="btn-out_for_delivery">
            Out for Delivery
          </button>
          <button onclick="setStatus('delivered')"
            class="text-xs px-3 py-1.5 rounded-lg bg-white/5 border border-white/10
                   text-gray-300 font-medium hover:bg-white/10 transition-colors"
            id="btn-delivered">
            Delivered
          </button>
        </div>
      </div>

      <!-- ThunderSlashWidget mounts here -->
      <div id="widget-mount"></div>

      <!-- Info note -->
      <div class="mt-4 bg-cyan-900/10 border border-cyan-800/30 rounded-xl p-3">
        <p class="text-cyan-500/70 text-xs text-center">
          ⚡ This demo runs against a mock API. Set status to "Rider Assigned" to see the game.
        </p>
      </div>
    </div>

    <script type="module">
      import React from 'https://esm.sh/react@18.3.1';
      import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';

      // Import from the built widget (or the source in dev)
      // In production: import { ThunderSlashWidget } from '@yourscope/xforce-thunderslash';
      // For this demo, we inline a mock version:

      let root = null;
      let currentStatus = 'rider_assigned';

      window.setStatus = function(status) {
        currentStatus = status;
        // Update button styles
        ['rider_assigned', 'out_for_delivery', 'delivered'].forEach(s => {
          const btn = document.getElementById(`btn-${s}`);
          if (s === status) {
            btn.className = btn.className.replace('text-gray-300 bg-white/5 border-white/10', '');
            btn.className = 'text-xs px-3 py-1.5 rounded-lg bg-cyan-900/40 border border-cyan-500/40 text-cyan-400 font-medium hover:bg-cyan-800/60 transition-colors';
          } else {
            btn.className = 'text-xs px-3 py-1.5 rounded-lg bg-white/5 border border-white/10 text-gray-300 font-medium hover:bg-white/10 transition-colors';
          }
        });
        renderWidget();
      };

      function renderWidget() {
        const mount = document.getElementById('widget-mount');
        if (!root) root = createRoot(mount);

        // Render a placeholder that shows the widget structure for demo
        const el = React.createElement('div', {
          className: 'w-full max-w-[480px] mx-auto rounded-xl overflow-hidden bg-gradient-to-b from-[#0a1122] via-[#040810] to-black border-2 border-cyan-800/60 shadow-[0_0_50px_rgba(0,160,227,0.12)] relative'
        }, renderWidgetContent());

        root.render(el);
      }

      function renderWidgetContent() {
        if (!['rider_assigned', 'out_for_delivery'].includes(currentStatus)) {
          return React.createElement('div', {
            className: 'p-4 text-center text-gray-500 text-sm'
          }, '✅ Order delivered! Game session ended.');
        }

        // In a real integration, ThunderSlashWidget handles all this.
        // This demo shows the visual structure.
        return React.createElement('div', null,
          // Header
          React.createElement('div', {
            className: 'px-4 pt-3 pb-2 bg-black/60 border-b border-cyan-800/60 relative z-10 backdrop-blur-sm'
          },
            React.createElement('div', { className: 'flex items-center justify-between mb-2' },
              React.createElement('span', { className: 'text-white text-xs sm:text-sm font-black tracking-widest italic uppercase' },
                'ALL THUNDER NO SUGAR ', React.createElement('span', { className: 'text-cyan-400 not-italic ml-1' }, '⚡')
              ),
              React.createElement('span', { className: 'text-white text-sm font-black tabular-nums bg-red-600/20 border border-red-500/40 rounded-sm px-3 py-0.5 shadow-[0_0_10px_rgba(227,24,55,0.2)]' }, '0')
            ),
            React.createElement('div', { className: 'w-full h-1.5 bg-white/5 rounded-full overflow-hidden' },
              React.createElement('div', { className: 'h-full bg-gradient-to-r from-red-500 to-red-700 rounded-full w-full transition-all' })
            )
          ),
          // Canvas placeholder
          React.createElement('div', {
            className: 'w-full flex flex-col items-center justify-center py-16 gap-3'
          },
            React.createElement('img', { src: '/thums_up_can.png', className: 'h-16 w-auto animate-bounce opacity-80', alt: '' }),
            React.createElement('p', { className: 'text-cyan-400/80 text-sm font-medium' }, 'PixiJS game loads here'),
            React.createElement('p', { className: 'text-gray-500 text-xs px-8 text-center' },
              'Run `npm run dev` in /game and /ui to see the live game canvas'
            )
          )
        );
      }

      // Initial render
      renderWidget();
      setStatus('rider_assigned');
    </script>
  </body>
</html>
