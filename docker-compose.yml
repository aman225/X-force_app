version: "3.9"

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: xforce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thunderslash
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thunderslash"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xforce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    command: redis-server --save 60 1 --loglevel warning

  # ── Fastify API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: xforce-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/thunderslash
      REDIS_URL: redis://redis:6379
      BLINKIT_JWT_SECRET: ${BLINKIT_JWT_SECRET}
      SESSION_JWT_SECRET: ${SESSION_JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://blinkit.com,http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Game Dev Server (Vite) ────────────────────────────────────────────────
  game-dev:
    build:
      context: ./game
      dockerfile: Dockerfile.dev
    container_name: xforce-game-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./game/src:/app/src:ro
      - ./game/index.html:/app/index.html:ro
    environment:
      NODE_ENV: development

volumes:
  postgres_data:
  redis_data:
